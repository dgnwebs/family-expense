<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Navy blue rounded square background -->
  <rect width="512" height="512" rx="112" fill="#1E3A8A"/>
  <!-- Soft inner glow -->
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <!-- Wallet body -->
  <rect x="80" y="176" width="352" height="232" rx="28" fill="white" opacity="0.95"/>
  <!-- Wallet flap -->
  <rect x="80" y="136" width="260" height="80" rx="20" fill="white" opacity="0.85"/>
  <!-- Coin pocket -->
  <rect x="310" y="236" width="100" height="112" rx="16" fill="#1E3A8A" opacity="0.18"/>
  <circle cx="360" cy="292" r="28" fill="#1E3A8A" opacity="0.25"/>
  <circle cx="360" cy="292" r="16" fill="#1E3A8A" opacity="0.35"/>
  <!-- Dollar line 1 -->
  <rect x="120" y="272" width="160" height="18" rx="9" fill="#1E3A8A" opacity="0.55"/>
  <!-- Dollar line 2 -->
  <rect x="120" y="314" width="110" height="14" rx="7" fill="#1E3A8A" opacity="0.3"/>
  <defs>
    <radialGradient id="g" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
